<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrum Sprint 解說</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f4f0;
      --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
      --border: rgba(0,0,0,0.15); --border2: rgba(0,0,0,0.25);
      --r-md: 8px; --r-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg2: #252523;
        --text: #e8e6de; --text2: #9c9a92; --text3: #6a6860;
        --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: var(--bg); color: var(--text);
      padding: 2rem 1.5rem; max-width: 780px; margin: 0 auto; line-height: 1.7;
    }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.2rem; }
    .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 1.75rem; }
    .diagram-wrap { width: 100%; overflow-x: auto; }
    .phase-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .phase-btn {
      cursor: pointer; border: 0.5px solid var(--border2);
      background: var(--bg); border-radius: var(--r-md);
      padding: 6px 14px; font-size: 13px; color: var(--text);
      transition: all .15s; font-family: inherit;
    }
    .phase-btn:hover { background: var(--bg2); }
    .phase-btn.active { border-color: #378ADD; background: #E6F1FB; color: #0C447C; font-weight: 500; }
    @media (prefers-color-scheme: dark) {
      .phase-btn.active { background: #042C53; color: #B5D4F4; }
    }
    .detail-card {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: var(--r-lg); padding: 16px 20px; margin-top: 14px;
      min-height: 80px;
    }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .card-title { font-size: 15px; font-weight: 500; }
    .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 500; }
    .tag-blue  { background: #E6F1FB; color: #0C447C; }
    .tag-amber { background: #FAEEDA; color: #633806; }
    .tag-green { background: #EAF3DE; color: #27500A; }
    .tag-coral { background: #FAECE7; color: #4A1B0C; }
    @media (prefers-color-scheme: dark) {
      .tag-blue  { background: #042C53; color: #B5D4F4; }
      .tag-amber { background: #412402; color: #FAC775; }
      .tag-green { background: #173404; color: #C0DD97; }
      .tag-coral { background: #4A1B0C; color: #F5C4B3; }
    }
    .meta-row { font-size: 13px; color: var(--text2); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .meta-icon { font-size: 15px; }
    .divider { border: none; border-top: 0.5px solid var(--border); margin: 12px 0; }
    .point-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 10px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .dot-blue { background: #378ADD; } .dot-amber { background: #BA7517; }
    .dot-green { background: #639922; } .dot-coral { background: #D85A30; }
    .point-text { font-size: 13px; color: var(--text); line-height: 1.6; }
    footer { margin-top: 3rem; font-size: 12px; color: var(--text3); border-top: 0.5px solid var(--border); padding-top: 1rem; }
  </style>
</head>
<body>
<h1>Scrum Sprint 週期</h1>
<p class="subtitle">點擊各階段了解詳細說明</p>

<div class="diagram-wrap">
<svg width="100%" viewBox="0 0 680 175" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Sprint 週期圖</title>
  <desc>Sprint 線性時間軸，從 Product Backlog 到 Sprint Retro</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Timeline spine -->
  <line x1="40" y1="78" x2="636" y2="78" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Product Backlog -->
  <g style="cursor:pointer" onclick="select('backlog')">
    <rect x="40" y="56" width="90" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text x="85" y="74" text-anchor="middle" font-size="11" font-weight="500" fill="#185FA5" font-family="-apple-system,sans-serif">Product</text>
    <text x="85" y="89" text-anchor="middle" font-size="11" font-weight="500" fill="#185FA5" font-family="-apple-system,sans-serif">Backlog</text>
  </g>

  <line x1="132" y1="78" x2="152" y2="78" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Sprint Planning -->
  <g style="cursor:pointer" onclick="select('planning')">
    <rect x="154" y="50" width="90" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text x="199" y="70" text-anchor="middle" font-size="11" font-weight="500" fill="#633806" font-family="-apple-system,sans-serif">Sprint</text>
    <text x="199" y="85" text-anchor="middle" font-size="11" font-weight="500" fill="#633806" font-family="-apple-system,sans-serif">Planning</text>
    <text x="199" y="99" text-anchor="middle" font-size="10" fill="#854F0B" font-family="-apple-system,sans-serif">Day 1</text>
  </g>

  <!-- 1-4週 Sprint dashed box -->
  <rect x="256" y="34" width="220" height="88" rx="10" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="366" y="26" text-anchor="middle" font-size="11" fill="#888780" font-style="italic" font-family="-apple-system,sans-serif">1–4 週 Sprint</text>

  <!-- Daily Scrum -->
  <g style="cursor:pointer" onclick="select('daily')">
    <rect x="264" y="50" width="90" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
    <text x="309" y="70" text-anchor="middle" font-size="11" font-weight="500" fill="#27500A" font-family="-apple-system,sans-serif">Daily</text>
    <text x="309" y="85" text-anchor="middle" font-size="11" font-weight="500" fill="#27500A" font-family="-apple-system,sans-serif">Scrum</text>
    <text x="309" y="99" text-anchor="middle" font-size="10" fill="#3B6D11" font-family="-apple-system,sans-serif">每天 15 分</text>
  </g>

  <line x1="356" y1="78" x2="372" y2="78" stroke="rgba(0,0,0,0.15)" stroke-width="0.7" stroke-dasharray="3 2"/>

  <!-- Sprint Review -->
  <g style="cursor:pointer" onclick="select('review')">
    <rect x="374" y="50" width="90" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text x="419" y="70" text-anchor="middle" font-size="11" font-weight="500" fill="#4A1B0C" font-family="-apple-system,sans-serif">Sprint</text>
    <text x="419" y="85" text-anchor="middle" font-size="11" font-weight="500" fill="#4A1B0C" font-family="-apple-system,sans-serif">Review</text>
    <text x="419" y="99" text-anchor="middle" font-size="10" fill="#993C1D" font-family="-apple-system,sans-serif">Last day</text>
  </g>

  <line x1="466" y1="78" x2="488" y2="78" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Sprint Retro -->
  <g style="cursor:pointer" onclick="select('retro')">
    <rect x="490" y="50" width="90" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
    <text x="535" y="70" text-anchor="middle" font-size="11" font-weight="500" fill="#26215C" font-family="-apple-system,sans-serif">Sprint</text>
    <text x="535" y="85" text-anchor="middle" font-size="11" font-weight="500" fill="#26215C" font-family="-apple-system,sans-serif">Retro.</text>
    <text x="535" y="99" text-anchor="middle" font-size="10" fill="#534AB7" font-family="-apple-system,sans-serif">Last day</text>
  </g>

  <!-- Return loop: orthogonal L-path -->
  <path d="M580 78 L618 78 L618 148 L85 148 L85 102" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="360" y="163" text-anchor="middle" font-size="10" fill="#888780" font-family="-apple-system,sans-serif">下一個 Sprint</text>
</svg>
</div>

<div class="phase-buttons">
  <button class="phase-btn active" id="btn-backlog"  onclick="select('backlog')">Product Backlog</button>
  <button class="phase-btn"        id="btn-planning" onclick="select('planning')">Sprint Planning</button>
  <button class="phase-btn"        id="btn-daily"    onclick="select('daily')">Daily Scrum</button>
  <button class="phase-btn"        id="btn-review"   onclick="select('review')">Sprint Review</button>
  <button class="phase-btn"        id="btn-retro"    onclick="select('retro')">Sprint Retro.</button>
</div>

<div class="detail-card" id="detail-card"></div>

<footer>Scrum Sprint 互動圖表 · 基於 Scrum Guide 2020</footer>

<script>
const phases = {
  backlog: {
    title: 'Product Backlog', tag: ['tag-blue','準備中'],
    who: 'Product Owner 負責維護', duration: '持續更新，不限時間',
    points: ['所有「待完成的功能」清單，稱為 User Story','依優先順序排列（最頂端 = 最重要）','每個 Story 需有明確的驗收條件','Sprint 開始前從中挑選要執行的項目'],
    dot: 'dot-blue'
  },
  planning: {
    title: 'Sprint Planning', tag: ['tag-amber','Sprint 第一天'],
    who: 'Product Owner + Scrum Master + 開發團隊', duration: '通常 2–4 小時（視 Sprint 長度）',
    points: ['確定本次 Sprint 的目標（Sprint Goal）','從 Product Backlog 頂端選出這次要做的 Story','開發團隊評估每個 Story 的工作量','產出 Sprint Backlog（本次衝刺待辦清單）'],
    dot: 'dot-amber'
  },
  daily: {
    title: 'Daily Scrum（每日站會）', tag: ['tag-green','每天執行'],
    who: '開發團隊（Scrum Master 引導）', duration: '固定 15 分鐘，同地點、同時間',
    points: ['每人回答三個問題：昨天做了什麼？今天計劃做什麼？有什麼阻礙？','目的是同步進度、揭露阻礙，不是進度報告','Scrum Master 負責在會後協助排除阻礙','Sprint Burndown Chart 在此更新'],
    dot: 'dot-green'
  },
  review: {
    title: 'Sprint Review（成果展示）', tag: ['tag-coral','Sprint 最後一天'],
    who: 'Product Owner、開發團隊、利害關係人', duration: '通常 1–2 小時',
    points: ['向利害關係人展示本次 Sprint 完成的功能（Demo）','只展示「Done」的項目，未完成的不算','收集回饋，調整 Product Backlog 的優先順序','確認下一個 Sprint 的方向'],
    dot: 'dot-coral'
  },
  retro: {
    title: 'Sprint Retrospective（回顧）', tag: ['tag-blue','Sprint 最後一天（Review 之後）'],
    who: '開發團隊 + Scrum Master', duration: '通常 1–1.5 小時',
    points: ['回顧這次 Sprint 的工作方式（不是產品）','討論：什麼做得好？什麼需要改善？','決定下一個 Sprint 要採取的具體改善行動','是 Scrum 持續改進（Inspect & Adapt）的核心儀式'],
    dot: 'dot-blue'
  }
};

function select(key) {
  document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + key).classList.add('active');
  const p = phases[key];
  document.getElementById('detail-card').innerHTML =
    '<div class="card-header"><span class="card-title">' + p.title + '</span><span class="tag ' + p.tag[0] + '">' + p.tag[1] + '</span></div>' +
    '<div class="meta-row"><span class="meta-icon">👥</span>' + p.who + '</div>' +
    '<div class="meta-row"><span class="meta-icon">⏱</span>' + p.duration + '</div>' +
    '<hr class="divider">' +
    p.points.map(pt => '<div class="point-row"><span class="dot ' + p.dot + '"></span><span class="point-text">' + pt + '</span></div>').join('');
}
select('backlog');
</script>
</body>
</html>
