<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrum Sprint 解說</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f5f4f0;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-border: rgba(0,0,0,0.15);
      --color-border-md: rgba(0,0,0,0.25);
      --radius-md: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1c1c1a;
        --color-bg-secondary: #252523;
        --color-text-primary: #e8e6de;
        --color-text-secondary: #9c9a92;
        --color-text-tertiary: #6a6860;
        --color-border: rgba(255,255,255,0.12);
        --color-border-md: rgba(255,255,255,0.22);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--color-bg);
      color: var(--color-text-primary);
      padding: 2rem 1rem;
      max-width: 760px;
      margin: 0 auto;
      line-height: 1.7;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 1.75rem;
    }

    .diagram-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .phase-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .phase-btn {
      cursor: pointer;
      border: 0.5px solid var(--color-border-md);
      background: var(--color-bg);
      border-radius: var(--radius-md);
      padding: 6px 14px;
      font-size: 13px;
      color: var(--color-text-primary);
      transition: all .15s;
      font-family: inherit;
    }
    .phase-btn:hover { background: var(--color-bg-secondary); }
    .phase-btn.active {
      border-color: #378ADD;
      background: #E6F1FB;
      color: #0C447C;
      font-weight: 500;
    }
    @media (prefers-color-scheme: dark) {
      .phase-btn.active {
        border-color: #378ADD;
        background: #042C53;
        color: #B5D4F4;
      }
    }

    .detail-card {
      background: var(--color-bg);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      margin-top: 14px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-primary);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 500;
    }
    .tag-blue  { background: #E6F1FB; color: #0C447C; }
    .tag-amber { background: #FAEEDA; color: #633806; }
    .tag-green { background: #EAF3DE; color: #27500A; }
    .tag-coral { background: #FAECE7; color: #4A1B0C; }
    @media (prefers-color-scheme: dark) {
      .tag-blue  { background: #042C53; color: #B5D4F4; }
      .tag-amber { background: #412402; color: #FAC775; }
      .tag-green { background: #173404; color: #C0DD97; }
      .tag-coral { background: #4A1B0C; color: #F5C4B3; }
    }

    .meta-row {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .meta-row i { font-size: 14px; }
    .divider {
      border: none;
      border-top: 0.5px solid var(--color-border);
      margin: 12px 0;
    }
    .point-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }
    .dot-blue  { background: #378ADD; }
    .dot-amber { background: #BA7517; }
    .dot-green { background: #639922; }
    .dot-coral { background: #D85A30; }
    .point-text {
      font-size: 13px;
      color: var(--color-text-primary);
      line-height: 1.6;
    }

    footer {
      margin-top: 3rem;
      font-size: 12px;
      color: var(--color-text-tertiary);
      border-top: 0.5px solid var(--color-border);
      padding-top: 1rem;
    }
  </style>
</head>
<body>

<h1>Scrum Sprint 週期</h1>
<p class="subtitle">點擊各階段了解詳細說明</p>

<div class="diagram-wrap">
<svg width="100%" viewBox="0 0 680 175" role="img">
  <title>Sprint 週期圖</title>
  <desc>一個 Sprint 的線性時間軸，從 Product Backlog 到 Sprint Retro，以直角折線返回下一個 Sprint</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    .t  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; fill: var(--color-text-primary, #1a1a18); }
    .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; fill: var(--color-text-secondary, #5f5e5a); }
    .arr { stroke: var(--color-border-md, rgba(0,0,0,0.25)); stroke-width: 1.5; fill: none; }
    .node { cursor: pointer; }
    .node:hover rect { opacity: 0.85; }
    @media (prefers-color-scheme: dark) {
      .t  { fill: #e8e6de; }
      .ts { fill: #9c9a92; }
    }
  </style>

  <!-- Timeline spine -->
  <line x1="40" y1="78" x2="636" y2="78" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Product Backlog -->
  <g class="node" onclick="select('backlog')">
    <rect x="40" y="56" width="90" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text x="85" y="74" text-anchor="middle" font-size="11" font-weight="500" fill="#185FA5">Product</text>
    <text x="85" y="89" text-anchor="middle" font-size="11" font-weight="500" fill="#185FA5">Backlog</text>
  </g>

  <line x1="132" y1="78" x2="152" y2="78" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Sprint Planning -->
  <g class="node" onclick="select('planning')">
    <rect x="154" y="50" width="90" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text x="199" y="70" text-anchor="middle" font-size="11" font-weight="500" fill="#633806">Sprint</text>
    <text x="199" y="85" text-anchor="middle" font-size="11" font-weight="500" fill="#633806">Planning</text>
    <text x="199" y="99" text-anchor="middle" font-size="10" fill="#854F0B">Day 1</text>
  </g>

  <!-- 1–4週 Sprint dashed box: right edge=476, Retro starts at 490 -->
  <rect x="256" y="34" width="220" height="88" rx="10" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="366" y="26" text-anchor="middle" font-size="11" fill="#888780" font-style="italic">1–4 週 Sprint</text>

  <!-- Daily Scrum -->
  <g class="node" onclick="select('daily')">
    <rect x="264" y="50" width="90" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
    <text x="309" y="70" text-anchor="middle" font-size="11" font-weight="500" fill="#27500A">Daily</text>
    <text x="309" y="85" text-anchor="middle" font-size="11" font-weight="500" fill="#27500A">Scrum</text>
    <text x="309" y="99" text-anchor="middle" font-size="10" fill="#3B6D11">每天 15 分</text>
  </g>

  <line x1="356" y1="78" x2="372" y2="78" stroke="rgba(0,0,0,0.15)" stroke-width="0.7" stroke-dasharray="3 2"/>

  <!-- Sprint Review -->
  <g class="node" onclick="select('review')">
    <rect x="374" y="50" width="90" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text x="419" y="70" text-anchor="middle" font-size="11" font-weight="500" fill="#4A1B0C">Sprint</text>
    <text x="419" y="85" text-anchor="middle" font-size="11" font-weight="500" fill="#4A1B0C">Review</text>
    <text x="419" y="99" text-anchor="middle" font-size="10" fill="#993C1D">Last day</text>
  </g>

  <line x1="466" y1="78" x2="488" y2="78" stroke="rgba(0,0,0,0.2)" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Sprint Retro -->
  <g class="node" onclick="select('retro')">
    <rect x="490" y="50" width="90" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
    <text x="535" y="70" text-anchor="middle" font-size="11" font-weight="500" fill="#26215C">Sprint</text>
    <text x="535" y="85" text-anchor="middle" font-size="11" font-weight="500" fill="#26215C">Retro.</text>
    <text x="535" y="99" text-anchor="middle" font-size="10" fill="#534AB7">Last day</text>
  </g>

  <!-- Return loop: orthogonal L-path -->
  <path d="M580 78 L618 78 L618 148 L85 148 L85 102" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="360" y="163" text-anchor="middle" font-size="10" fill="#888780">下一個 Sprint</text>
</svg>
</div>

<div class="phase-buttons">
  <button class="phase-btn active" id="btn-backlog"  onclick="select('backlog')">Product Backlog</button>
  <button class="phase-btn"        id="btn-planning" onclick="select('planning')">Sprint Planning</button>
  <button class="phase-btn"        id="btn-daily"    onclick="select('daily')">Daily Scrum</button>
  <button class="phase-btn"        id="btn-review"   onclick="select('review')">Sprint Review</button>
  <button class="phase-btn"        id="btn-retro"    onclick="select('retro')">Sprint Retro.</button>
</div>

<div class="detail-card" id="detail-card"></div>

<footer>Scrum Sprint 互動圖表 · 基於 Scrum Guide 2020</footer>

<script>
const phases = {
  backlog: {
    title: 'Product Backlog',
    tag: ['tag-blue','準備中'],
    who: 'Product Owner 負責維護',
    duration: '持續更新，不限時間',
    points: [
      '所有「待完成的功能」清單，稱為 User Story',
      '依優先順序排列（最頂端 = 最重要）',
      '每個 Story 需有明確的驗收條件',
      'Sprint 開始前從中挑選要執行的項目',
    ],
    dotClass: 'dot-blue',
  },
  planning: {
    title: 'Sprint Planning',
    tag: ['tag-amber','Sprint 第一天'],
    who: 'Product Owner + Scrum Master + 開發團隊',
    duration: '通常 2–4 小時（視 Sprint 長度）',
    points: [
      '確定本次 Sprint 的目標（Sprint Goal）',
      '從 Product Backlog 頂端選出這次要做的 Story',
      '開發團隊評估每個 Story 的工作量',
      '產出 Sprint Backlog（本次衝刺待辦清單）',
    ],
    dotClass: 'dot-amber',
  },
  daily: {
    title: 'Daily Scrum（每日站會）',
    tag: ['tag-green','每天執行'],
    who: '開發團隊（Scrum Master 引導）',
    duration: '固定 15 分鐘，同地點、同時間',
    points: [
      '每人回答三個問題：昨天做了什麼？今天計劃做什麼？有什麼阻礙？',
      '目的是同步進度、揭露阻礙，不是進度報告',
      'Scrum Master 負責在會後協助排除阻礙',
      'Sprint Burndown Chart 在此更新',
    ],
    dotClass: 'dot-green',
  },
  review: {
    title: 'Sprint Review（成果展示）',
    tag: ['tag-coral','Sprint 最後一天'],
    who: 'Product Owner、開發團隊、利害關係人',
    duration: '通常 1–2 小時',
    points: [
      '向利害關係人展示本次 Sprint 完成的功能（Demo）',
      '只展示「Done」的項目，未完成的不算',
      '收集回饋，調整 Product Backlog 的優先順序',
      '確認下一個 Sprint 的方向',
    ],
    dotClass: 'dot-coral',
  },
  retro: {
    title: 'Sprint Retrospective（回顧）',
    tag: ['tag-blue','Sprint 最後一天（Review 之後）'],
    who: '開發團隊 + Scrum Master',
    duration: '通常 1–1.5 小時',
    points: [
      '回顧這次 Sprint 的工作方式（不是產品）',
      '討論：什麼做得好？什麼需要改善？',
      '決定下一個 Sprint 要採取的具體改善行動',
      '是 Scrum 持續改進（Inspect & Adapt）的核心儀式',
    ],
    dotClass: 'dot-blue',
  },
};

function select(key) {
  document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + key).classList.add('active');
  const p = phases[key];
  document.getElementById('detail-card').innerHTML = `
    <div class="card-header">
      <span class="card-title">${p.title}</span>
      <span class="tag ${p.tag[0]}">${p.tag[1]}</span>
    </div>
    <div class="meta-row"><i class="ti ti-users"></i>${p.who}</div>
    <div class="meta-row"><i class="ti ti-clock"></i>${p.duration}</div>
    <hr class="divider">
    ${p.points.map(pt => `
      <div class="point-row">
        <span class="dot ${p.dotClass}"></span>
        <span class="point-text">${pt}</span>
      </div>`).join('')}
  `;
}
select('backlog');
</script>
</body>
</html>
